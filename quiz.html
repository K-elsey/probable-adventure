<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .score-display {
            text-align: center;
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .quote-display {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 25px;
            margin: 30px 0;
            border-radius: 8px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            line-height: 1.6;
            color: #333;
            text-align: center;
            font-style: italic;
        }

        .quote-display.loading::before {
            content: "Loading quote...";
            color: #999;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .option-btn {
            padding: 15px 20px;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
        }

        .option-btn:hover {
            background: #f8f9fa;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .option-btn.incorrect {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .next-btn, .back-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .next-btn:hover, .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .next-btn:active, .back-btn:active {
            transform: translateY(-1px);
        }

        .back-btn {
            background: #6c757d;
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }

        .back-btn:hover {
            box-shadow: 0 8px 20px rgba(108, 117, 125, 0.4);
        }

        .result-message {
            text-align: center;
            margin: 20px 0;
            font-size: 1.2em;
            font-weight: 600;
        }

        .result-message.correct {
            color: #28a745;
        }

        .result-message.incorrect {
            color: #dc3545;
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .score-display {
                font-size: 1em;
            }

            .quote-display {
                min-height: 100px;
                font-size: 1em;
                padding: 20px;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .option-btn {
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤔 Quote Quiz 🤔</h1>

        <div class="score-display" id="scoreDisplay">Score: 0</div>

        <div class="error-message" id="errorMessage"></div>

        <div class="quote-display loading" id="quoteDisplay"></div>

        <div class="options-container" id="optionsContainer"></div>

        <div class="result-message" id="resultMessage"></div>

        <div class="button-group">
            <button class="back-btn" id="backBtn">Back to Generator</button>
            <button class="next-btn" id="nextBtn">Next Question</button>
        </div>
    </div>

    <script>
        let currentQuote = "";
        let currentSource = "";
        let selectedSources = ['brown', 'jaae', 'quote']; // Always use all 3 sources
        let quotesCache = {};
        let hasAnswered = false;
        let score = 0;
        let availableNames = ['Jaae', 'Sean']; // Will be populated with names from Brown file
        let currentCorrectName = ""; // The correct name for the current question

        const quoteDisplay = document.getElementById('quoteDisplay');
        const optionsContainer = document.getElementById('optionsContainer');
        const resultMessage = document.getElementById('resultMessage');
        const errorMessage = document.getElementById('errorMessage');
        const nextBtn = document.getElementById('nextBtn');
        const backBtn = document.getElementById('backBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');

        // Map source names to GitHub URLs
        const sourceUrls = {
            brown: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Brown',
            jaae: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Jaae',
            quote: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Quote'
        };

        const sourceNames = {
            brown: 'Chat',
            jaae: 'Jaae',
            quote: 'Sean'
        };

        // Initialize quiz
        async function initQuiz() {
            // Always use all 3 sources for the quiz
            await loadNextQuestion();
        }

        // Fetch quotes from GitHub
        async function fetchQuotes(source) {
            if (quotesCache[source]) {
                return quotesCache[source];
            }

            try {
                const response = await fetch(sourceUrls[source]);
                if (!response.ok) {
                    throw new Error(`Failed to fetch from ${source}`);
                }
                const text = await response.text();
                const quotes = text
                    .split(';')
                    .map(q => q.trim())
                    .filter(q => q.length > 0);

                // Extract names from Brown quotes (multiple possible formats)
                if (source === 'brown') {
                    quotes.forEach(quote => {
                        let nameMatch = null;
                        
                        // Try different patterns in order of preference
                        // Pattern 1: - Name Month YY (standard format)
                        nameMatch = nameMatch || quote.match(/- ([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                        
                        // Pattern 2: - Name Month YY (with space before dash)
                        nameMatch = nameMatch || quote.match(/\s- ([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                        
                        // Pattern 3: Name Month YY (no dash)
                        nameMatch = nameMatch || quote.match(/([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                        
                        // Pattern 4: - Name1 Name2 Month YY (two-part names)
                        nameMatch = nameMatch || quote.match(/- ([A-Za-z]+) ([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                        
                        // Pattern 5: - Name1 Name2 Month YY (with space before dash)
                        nameMatch = nameMatch || quote.match(/\s- ([A-Za-z]+) ([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                        
                        if (nameMatch) {
                            let name = '';
                            if (nameMatch.length === 3) {
                                // Single name patterns
                                name = nameMatch[1];
                            } else if (nameMatch.length === 4) {
                                // Two-part name patterns
                                name = `${nameMatch[1]} ${nameMatch[2]}`;
                            }
                            
                            if (name && !availableNames.includes(name)) {
                                availableNames.push(name);
                            }
                        }
                    });
                }

                quotesCache[source] = quotes;
                return quotes;
            } catch (error) {
                showError(`Error fetching quotes from ${sourceNames[source]}: ${error.message}`);
                throw error;
            }
        }

        // Load next question
        async function loadNextQuestion() {
            hasAnswered = false;
            resultMessage.textContent = '';
            resultMessage.className = 'result-message';
            errorMessage.classList.remove('show');

            try {
                // Randomly select a source
                currentSource = selectedSources[Math.floor(Math.random() * selectedSources.length)];

                // Get quotes from that source
                const quotes = await fetchQuotes(currentSource);

                if (quotes.length === 0) {
                    throw new Error('No quotes found');
                }

                // Select random quote
                currentQuote = quotes[Math.floor(Math.random() * quotes.length)];

                // Determine the correct name based on source
                if (currentSource === 'brown') {
                    // Extract name from Brown quote attribution using multiple patterns
                    let nameMatch = null;
                    
                    // Try different patterns in order of preference
                    nameMatch = nameMatch || currentQuote.match(/- ([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                    nameMatch = nameMatch || currentQuote.match(/\s- ([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                    nameMatch = nameMatch || currentQuote.match(/([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                    nameMatch = nameMatch || currentQuote.match(/- ([A-Za-z]+) ([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                    nameMatch = nameMatch || currentQuote.match(/\s- ([A-Za-z]+) ([A-Za-z]+) ([A-Za-z]{3}) \d{2}$/);
                    
                    if (nameMatch) {
                        if (nameMatch.length === 3) {
                            currentCorrectName = nameMatch[1];
                        } else if (nameMatch.length === 4) {
                            currentCorrectName = `${nameMatch[1]} ${nameMatch[2]}`;
                        }
                    } else {
                        currentCorrectName = 'Unknown';
                    }
                } else if (currentSource === 'jaae') {
                    currentCorrectName = 'Jaae';
                } else if (currentSource === 'quote') {
                    currentCorrectName = 'Sean';
                }

                // For Brown quotes, hide the attribution (multiple possible formats)
                let displayQuote = currentQuote;
                if (currentSource === 'brown') {
                    // Remove various attribution patterns
                    displayQuote = displayQuote
                        .replace(/\s*-\s*[A-Za-z]+(?:\s+[A-Za-z]+)?\s+[A-Za-z]{3}\s+\d{2}$/, '') // - Name Month YY or - Name1 Name2 Month YY
                        .replace(/\s*[A-Za-z]+(?:\s+[A-Za-z]+)?\s+[A-Za-z]{3}\s+\d{2}$/, ''); // Name Month YY or Name1 Name2 Month YY (no dash)
                }

                quoteDisplay.textContent = `"${displayQuote}"`;
                quoteDisplay.classList.remove('loading');

                // Generate options
                generateOptions();

            } catch (error) {
                quoteDisplay.textContent = 'Error loading quote';
                quoteDisplay.classList.add('loading');
            }
        }

        // Generate answer options (3 random names from available pool, including correct one)
        function generateOptions() {
            optionsContainer.innerHTML = '';

            // Ensure we have enough names
            if (availableNames.length < 3) {
                // Fallback if we don't have enough names
                const options = ['Jaae', 'Sean', 'Unknown'];
                const shuffledOptions = options.sort(() => Math.random() - 0.5);
                
                shuffledOptions.forEach(option => {
                    const button = document.createElement('button');
                    button.className = 'option-btn';
                    button.textContent = option;
                    button.addEventListener('click', () => checkAnswer(option));
                    optionsContainer.appendChild(button);
                });
                return;
            }

            // Create options array: correct answer + 2 random wrong answers
            const options = [currentCorrectName];
            
            // Get wrong options (excluding the correct one)
            const wrongOptions = availableNames.filter(name => name !== currentCorrectName);
            
            // Randomly select 2 wrong options
            const shuffledWrong = wrongOptions.sort(() => Math.random() - 0.5);
            options.push(shuffledWrong[0], shuffledWrong[1]);

            // Shuffle the final options
            const shuffledOptions = options.sort(() => Math.random() - 0.5);

            // Create buttons
            shuffledOptions.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option;
                button.addEventListener('click', () => checkAnswer(option));
                optionsContainer.appendChild(button);
            });
        }

        // Check answer
        function checkAnswer(selectedName) {
            if (hasAnswered) return;

            hasAnswered = true;
            const correctName = currentCorrectName;
            const buttons = optionsContainer.querySelectorAll('.option-btn');

            buttons.forEach(btn => {
                if (btn.textContent === correctName) {
                    btn.classList.add('correct');
                } else if (btn.textContent === selectedName && selectedName !== correctName) {
                    btn.classList.add('incorrect');
                }
            });

            if (selectedName === correctName) {
                score += 1;
                resultMessage.textContent = '✅ Correct! +1 point';
                resultMessage.classList.add('correct');
            } else {
                resultMessage.textContent = `❌ Incorrect! The correct answer is ${correctName}`;
                resultMessage.classList.add('incorrect');
            }

            scoreDisplay.textContent = `Score: ${score}`;
        }

        // Event listeners
        nextBtn.addEventListener('click', loadNextQuestion);
        backBtn.addEventListener('click', () => {
            window.close();
        });

        // Initialize when page loads
        window.addEventListener('load', initQuiz);

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
