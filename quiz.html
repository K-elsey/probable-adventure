<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="quiz-page">
    <div class="top-nav">
        <div class="nav-title">Quote Quiz</div>
        <div class="nav-actions">
            <button type="button" class="theme-btn" id="themeToggleBtn">Old School</button>
        </div>
    </div>

    <div class="container">
        <div class="mode-menu" id="modeMenu"></div>

        <div class="progress-panel">
            <div class="progress-info">
                <div class="session-info">
                    <div class="score-display" id="scoreDisplay">Score: 0/10</div>
                    <div class="accuracy-display" id="accuracyDisplay">Accuracy: 0%</div>
                </div>
                <div class="timer-display" id="timerDisplay"></div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-dots" id="progressDots"></div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="quote-display loading" id="quoteDisplay"></div>
        <div class="options-container" id="optionsContainer"></div>
        <div class="result-message" id="resultMessage"></div>

        <div class="final-screen hidden" id="finalScreen">
            <div class="final-title">Quiz Complete</div>
            <div class="final-score" id="finalScore"></div>
            <div class="final-summary" id="finalSummary"></div>
            <button type="button" class="next-btn" id="restartBtn">Restart Quiz</button>
        </div>

        <div class="button-group">
            <button type="button" class="back-btn" id="backBtn">Back to Generator</button>
            <button type="button" class="next-btn" id="nextBtn" disabled>Next Question</button>
        </div>
    </div>

    <script>
        const maxQuestions = 10;
        let currentModeId = 'allCommands';
        let currentQuestionIndex = 0;
        let currentQuote = '';
        let currentSource = '';
        let currentCorrectAnswer = '';
        let quotesCache = {};
        let hasAnswered = false;
        let score = 0;
        let attempts = 0;
        let questionTimer = null;
        let countdownInterval = null;
        let availableNames = ['Jaae', 'Sean'];
        let chatterNames = [];

        const quoteDisplay = document.getElementById('quoteDisplay');
        const optionsContainer = document.getElementById('optionsContainer');
        const resultMessage = document.getElementById('resultMessage');
        const errorMessage = document.getElementById('errorMessage');
        const nextBtn = document.getElementById('nextBtn');
        const backBtn = document.getElementById('backBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const accuracyDisplay = document.getElementById('accuracyDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const modeMenu = document.getElementById('modeMenu');
        const progressDots = document.getElementById('progressDots');
        const progressFill = document.getElementById('progressFill');
        const finalScreen = document.getElementById('finalScreen');
        const finalScore = document.getElementById('finalScore');
        const finalSummary = document.getElementById('finalSummary');
        const restartBtn = document.getElementById('restartBtn');
        const themeToggleBtn = document.getElementById('themeToggleBtn');

        const sourceUrls = {
            brown: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/refs/heads/main/ChatterQuotes.csv',
            jaae: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Jaae',
            quote: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Quote'
        };

        const sourceNames = {
            brown: 'Chat',
            jaae: 'Jaae',
            quote: 'Sean'
        };

        const csvMonthNames = {
            january: 'Jan',
            jan: 'Jan',
            february: 'Feb',
            feb: 'Feb',
            march: 'Mar',
            mar: 'Mar',
            april: 'Apr',
            apr: 'Apr',
            may: 'May',
            june: 'Jun',
            jun: 'Jun',
            july: 'Jul',
            jul: 'Jul',
            august: 'Aug',
            aug: 'Aug',
            september: 'Sep',
            sept: 'Sep',
            sep: 'Sep',
            october: 'Oct',
            oct: 'Oct',
            november: 'Nov',
            nov: 'Nov',
            december: 'Dec',
            dec: 'Dec'
        };
        const monthPattern = 'Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Sept|Oct|Nov|Dec|January|February|March|April|May|June|July|August|September|October|November|December';

        function parseDelimitedRow(row, delimiter) {
            const cells = [];
            let cell = '';
            let inQuotes = false;

            for (let i = 0; i < row.length; i += 1) {
                const char = row[i];
                const nextChar = row[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        cell += '"';
                        i += 1;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === delimiter && !inQuotes) {
                    cells.push(cell.trim());
                    cell = '';
                } else {
                    cell += char;
                }
            }

            cells.push(cell.trim());
            return cells;
        }

        function normalizeCsvMonth(month) {
            return csvMonthNames[month.toLowerCase()] || month;
        }

        function recoverMissingCsvMetadata(quoteText) {
            const dashMatch = quoteText.match(new RegExp(`^(.*?)\\s*-\\s*([A-Za-z0-9][A-Za-z0-9 ]*?)\\s+(${monthPattern})(?:\\s*(\\d{2,4}))?$`, 'i'));
            if (dashMatch) {
                return {
                    quoteText: dashMatch[1].trim(),
                    user: dashMatch[2].replace(/\s+/g, ' ').trim(),
                    month: normalizeCsvMonth(dashMatch[3].trim()),
                    year: dashMatch[4] ? dashMatch[4].trim().slice(-2) : ''
                };
            }

            const commaNameMatch = quoteText.match(/^(.*?),\s*([A-Za-z0-9][A-Za-z0-9 ]{1,30})$/);
            if (commaNameMatch) {
                return {
                    quoteText: commaNameMatch[1].trim(),
                    user: commaNameMatch[2].replace(/\s+/g, ' ').trim(),
                    month: '',
                    year: ''
                };
            }

            return { quoteText, user: '', month: '', year: '' };
        }

        function parseCsvText(text) {
            const rows = text.split(/\r?\n/).map(row => row.trim()).filter(row => row.length > 0);
            if (rows.length === 0) return [];

            const delimiter = rows[0].includes('\t') ? '\t' : ',';
            const header = parseDelimitedRow(rows[0], delimiter);
            const quoteIndex = header.findIndex(cell => /quote/i.test(cell));
            const nameIndex = header.findIndex(cell => /user|name/i.test(cell));
            const monthIndex = header.findIndex(cell => /month/i.test(cell));
            const yearIndex = header.findIndex(cell => /year/i.test(cell));
            if (quoteIndex < 0) return [];

            return rows.slice(1).map(row => {
                const cells = parseDelimitedRow(row, delimiter);
                let quoteText = cells[quoteIndex] || '';
                let user = (nameIndex >= 0 ? cells[nameIndex] || '' : '').replace(/\s+/g, ' ').trim();
                let month = monthIndex >= 0 ? (cells[monthIndex] || '').trim() : '';
                let year = yearIndex >= 0 ? (cells[yearIndex] || '').trim() : '';

                if (!user) {
                    const recovered = recoverMissingCsvMetadata(quoteText);
                    quoteText = recovered.quoteText;
                    user = recovered.user;
                    month = recovered.month;
                    year = recovered.year;
                }

                const suffixParts = [];
                if (user) suffixParts.push(user);
                if (month) suffixParts.push(month);
                if (year) suffixParts.push(year);
                const suffix = suffixParts.length ? ` - ${suffixParts.join(' ')}` : '';
                return `${quoteText}${suffix}`.trim();
            }).filter(line => line.length > 0);
        }

        const quizModes = {
            chatters: {
                id: 'chatters',
                label: 'Chatters quiz',
                sources: ['brown'],
                type: 'multipleChoice'
            },
            chattersHard: {
                id: 'chattersHard',
                label: 'Chatters Hard',
                sources: ['brown'],
                type: 'textEntry'
            },
            allCommands: {
                id: 'allCommands',
                label: 'All commands quiz',
                sources: ['brown', 'jaae', 'quote'],
                type: 'multipleChoice'
            },
            speed: {
                id: 'speed',
                label: 'Speed quiz',
                sources: ['brown'],
                type: 'speed',
                timeLimit: 10,
                maxQuoteLength: 123
            }
        };

        function extractChatName(quote) {
            const monthMatch = quote.match(new RegExp(`(${monthPattern})(?:\\s+\\d{2,4})?$`, 'i'));
            if (!monthMatch) {
                const suffixMatch = quote.match(/\s-\s([A-Za-z0-9][A-Za-z0-9 ]*)$/);
                return suffixMatch ? suffixMatch[1].replace(/\s+/g, ' ').trim() : null;
            }

            const beforeMonth = quote.slice(0, monthMatch.index).trim();
            const afterDash = beforeMonth.includes('-')
                ? beforeMonth.substring(beforeMonth.lastIndexOf('-') + 1).trim()
                : beforeMonth;

            const nameCandidate = afterDash.replace(/\s+/g, ' ').trim();
            if (/^[A-Za-z0-9][A-Za-z0-9 ]*$/.test(nameCandidate)) {
                return nameCandidate;
            }

            const tokens = beforeMonth.split(/\s+/);
            for (let len = Math.min(3, tokens.length); len > 0; len--) {
                const candidate = tokens.slice(-len).join(' ');
                if (/^[A-Za-z0-9][A-Za-z0-9 ]*$/.test(candidate)) {
                    return candidate;
                }
            }

            return null;
        }

        function normalizeName(name) {
            return name ? name.replace(/\s+/g, '') : name;
        }

        function compareNames(firstName, secondName) {
            return normalizeName(firstName || '').toLowerCase() === normalizeName(secondName || '').toLowerCase();
        }

        function addUniqueName(list, name) {
            if (name && !list.some(existing => compareNames(existing, name))) {
                list.push(name);
            }
        }

        function loadTheme() {
            const storedTheme = localStorage.getItem('quizTheme');
            if (storedTheme === 'old-school') {
                document.body.classList.add('old-school');
                themeToggleBtn.textContent = 'Classic';
            } else {
                document.body.classList.remove('old-school');
                themeToggleBtn.textContent = 'Old School';
            }
        }

        function toggleTheme() {
            const nowOldSchool = document.body.classList.toggle('old-school');
            localStorage.setItem('quizTheme', nowOldSchool ? 'old-school' : 'default');
            themeToggleBtn.textContent = nowOldSchool ? 'Classic' : 'Old School';
        }

        function buildModeMenu() {
            modeMenu.innerHTML = '';
            Object.values(quizModes).forEach(mode => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'mode-btn';
                button.textContent = mode.label;
                button.dataset.mode = mode.id;
                button.addEventListener('click', () => selectMode(mode.id));
                if (mode.id === currentModeId) {
                    button.classList.add('active');
                }
                modeMenu.appendChild(button);
            });
        }

        function selectMode(modeId) {
            if (!quizModes[modeId] || currentModeId === modeId) return;
            currentModeId = modeId;
            startQuiz();
        }

        function updateScoreDisplay() {
            scoreDisplay.textContent = `Score: ${score}/${maxQuestions}`;
            const accuracy = attempts === 0 ? 0 : Math.round((score / attempts) * 100);
            accuracyDisplay.textContent = `Accuracy: ${accuracy}%`;
        }

        function createProgressDots() {
            progressDots.innerHTML = '';
            for (let i = 0; i < maxQuestions; i += 1) {
                const dot = document.createElement('span');
                dot.className = 'progress-dot';
                dot.textContent = i + 1;
                progressDots.appendChild(dot);
            }
            progressFill.style.width = '0%';
        }

        function markProgress(correct) {
            const dot = progressDots.children[currentQuestionIndex];
            if (!dot) return;
            dot.classList.add(correct ? 'correct' : 'incorrect');
            const fillPercent = ((currentQuestionIndex + 1) / maxQuestions) * 100;
            progressFill.style.width = `${fillPercent}%`;
        }

        async function initQuiz() {
            loadTheme();
            currentModeId = getModeFromQuery() || currentModeId;
            buildModeMenu();
            startQuiz();
        }

        function getModeFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            return quizModes[mode] ? mode : null;
        }

        function clearTimers() {
            if (questionTimer) {
                clearTimeout(questionTimer);
                questionTimer = null;
            }
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
        }

        function setTimerDisplay(text) {
            timerDisplay.textContent = text;
        }

        function showFinalScreen() {
            finalScore.textContent = `Final score: ${score}/${maxQuestions} (${Math.round((score / maxQuestions) * 100)}%)`;
            finalSummary.textContent = `You answered ${score} out of ${maxQuestions} correctly.`;
            finalScreen.classList.remove('hidden');
            optionsContainer.innerHTML = '';
            quoteDisplay.textContent = '';
            nextBtn.disabled = true;
            setTimerDisplay('');
        }

        function hideFinalScreen() {
            finalScreen.classList.add('hidden');
        }

        function startQuiz() {
            clearTimers();
            currentQuestionIndex = 0;
            score = 0;
            attempts = 0;
            hasAnswered = false;
            resultMessage.textContent = '';
            resultMessage.className = 'result-message';
            errorMessage.classList.remove('show');
            hideFinalScreen();
            buildModeMenu();
            createProgressDots();
            updateScoreDisplay();
            loadNextQuestion();
        }

        async function fetchQuotes(source) {
            if (quotesCache[source]) {
                return quotesCache[source];
            }

            try {
                const response = await fetch(sourceUrls[source]);
                if (!response.ok) {
                    throw new Error(`Failed to fetch from ${source}`);
                }
                const text = await response.text();
                const quotes = source === 'brown'
                    ? parseCsvText(text)
                    : text
                        .split(';')
                        .map(q => q.trim())
                        .filter(q => q.length > 0);

                if (source === 'brown') {
                    quotes.forEach(quote => {
                        const extracted = extractChatName(quote);
                        if (extracted) {
                            const normalized = normalizeName(extracted);
                            addUniqueName(availableNames, normalized);
                            addUniqueName(chatterNames, normalized);
                        }
                    });
                }

                quotesCache[source] = quotes;
                return quotes;
            } catch (error) {
                showError(`Error fetching quotes from ${sourceNames[source]}: ${error.message}`);
                throw error;
            }
        }

        async function loadNextQuestion() {
            clearTimers();
            hasAnswered = false;
            resultMessage.textContent = '';
            resultMessage.className = 'result-message';
            errorMessage.classList.remove('show');
            nextBtn.disabled = true;
            setTimerDisplay('');

            if (currentQuestionIndex >= maxQuestions) {
                showFinalScreen();
                return;
            }

            const mode = quizModes[currentModeId];
            if (!mode) {
                showError('Quiz mode not found.');
                return;
            }

            try {
                if (mode.type === 'speed') {
                    await renderSpeedQuestion(mode);
                } else if (mode.type === 'textEntry') {
                    await renderTextEntryQuestion(mode);
                } else {
                    await renderMultipleChoiceQuestion(mode);
                }
            } catch (error) {
                quoteDisplay.textContent = 'Error loading question';
                quoteDisplay.classList.add('loading');
            }
        }

        function getCleanQuoteText(rawQuote) {
            let text = rawQuote;
            text = text.replace(new RegExp(`\\s*-\\s*[A-Za-z0-9][A-Za-z0-9 ]*\\s+(${monthPattern})\\s+\\d{2,4}$`, 'i'), '');
            text = text.replace(new RegExp(`\\s*-\\s*[A-Za-z0-9][A-Za-z0-9 ]*\\s+(${monthPattern})$`, 'i'), '');
            text = text.replace(/\s*-\s*[A-Za-z0-9][A-Za-z0-9 ]*$/, '');
            return text.trim();
        }

        function isShortEnoughForSpeed(quote, maxLength) {
            return getCleanQuoteText(quote).length <= maxLength;
        }

        async function renderMultipleChoiceQuestion(mode) {
            currentSource = mode.sources[Math.floor(Math.random() * mode.sources.length)];
            const quotes = await fetchQuotes(currentSource);
            if (quotes.length === 0) {
                throw new Error('No quotes available');
            }

            currentQuote = quotes[Math.floor(Math.random() * quotes.length)];
            if (currentSource === 'brown') {
                const extractedName = extractChatName(currentQuote);
                currentCorrectAnswer = normalizeName(extractedName);
                if (!currentCorrectAnswer) {
                    throw new Error('Selected quote is missing a chatter name');
                }
            } else {
                currentCorrectAnswer = currentSource === 'jaae' ? 'Jaae' : 'Sean';
            }

            const displayQuote = currentSource === 'brown' ? getCleanQuoteText(currentQuote) : currentQuote;
            quoteDisplay.textContent = `"${displayQuote}"`;
            quoteDisplay.classList.remove('loading');
            const options = buildNameOptions(currentCorrectAnswer);
            generateOptions(mode.type, options, currentCorrectAnswer);
        }

        async function renderTextEntryQuestion(mode) {
            currentSource = 'brown';
            const quotes = await fetchQuotes(currentSource);
            const validQuotes = quotes.filter(quote => extractChatName(quote));
            if (validQuotes.length === 0 || chatterNames.length === 0) {
                throw new Error('No chatter names available');
            }

            currentQuote = validQuotes[Math.floor(Math.random() * validQuotes.length)];
            currentCorrectAnswer = normalizeName(extractChatName(currentQuote));
            quoteDisplay.textContent = `"${getCleanQuoteText(currentQuote)}"`;
            quoteDisplay.classList.remove('loading');
            generateTextAnswer();
        }

        function buildNameOptions(correctName) {
            const pool = Array.from(new Set(availableNames))
                .filter(name => !compareNames(name, correctName));
            if (correctName) {
                pool.push(correctName);
            }

            const wrongOptions = pool.filter(name => !compareNames(name, correctName));
            const shuffledWrong = wrongOptions.sort(() => Math.random() - 0.5);
            const options = [correctName];

            for (let i = 0; i < 3 && i < shuffledWrong.length; i += 1) {
                options.push(shuffledWrong[i]);
            }

            while (options.length < 4) {
                const fallback = ['Jaae', 'Sean'].find(name => !options.includes(name));
                if (!fallback) break;
                options.push(fallback);
            }

            return options.sort(() => Math.random() - 0.5);
        }

        async function renderSpeedQuestion(mode) {
            const quotes = await fetchQuotes('brown');
            const speedQuotes = quotes.filter(quote => extractChatName(quote) && isShortEnoughForSpeed(quote, mode.maxQuoteLength));
            if (speedQuotes.length < 2) {
                throw new Error('No speed quiz data available');
            }

            const chosenCorrectQuote = speedQuotes[Math.floor(Math.random() * speedQuotes.length)];
            currentCorrectAnswer = normalizeName(extractChatName(chosenCorrectQuote));
            const wrongQuote = selectDistractorQuote(speedQuotes, chosenCorrectQuote);

            currentQuote = getCleanQuoteText(chosenCorrectQuote);
            quoteDisplay.textContent = `Which quote was said by ${currentCorrectAnswer}?`;
            quoteDisplay.classList.remove('loading');
            generateOptions(mode.type, [currentQuote, getCleanQuoteText(wrongQuote)], currentQuote);
            beginCountdown(mode.timeLimit);
        }

        function selectDistractorQuote(quotes, correctQuote) {
            const wrongQuotes = quotes.filter(q => q !== correctQuote && normalizeName(extractChatName(q)) !== currentCorrectAnswer);
            if (wrongQuotes.length === 0) {
                return quotes.find(q => q !== correctQuote) || correctQuote;
            }
            return wrongQuotes[Math.floor(Math.random() * wrongQuotes.length)];
        }

        function generateOptions(type, options, correctAnswer) {
            optionsContainer.innerHTML = '';
            const shuffledOptions = options.sort(() => Math.random() - 0.5);
            shuffledOptions.forEach(option => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'option-btn';
                button.textContent = option;
                button.addEventListener('click', () => checkAnswer(option));
                optionsContainer.appendChild(button);
            });
        }

        function generateTextAnswer() {
            optionsContainer.innerHTML = '';

            const form = document.createElement('form');
            form.className = 'typed-answer';
            form.autocomplete = 'off';

            const dataList = document.createElement('datalist');
            dataList.id = 'chatterNameOptions';

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'typed-answer-input';
            input.setAttribute('list', dataList.id);
            input.setAttribute('aria-label', 'Chatter name');
            input.placeholder = 'Chatter name';

            const submitButton = document.createElement('button');
            submitButton.type = 'submit';
            submitButton.className = 'submit-answer-btn';
            submitButton.textContent = 'Submit';

            function updateNameSuggestions() {
                const searchText = input.value.trim().toLowerCase();
                dataList.innerHTML = '';
                if (searchText.length < 3) return;

                chatterNames
                    .slice()
                    .sort((first, second) => first.localeCompare(second))
                    .filter(name => name.toLowerCase().includes(searchText))
                    .forEach(name => {
                        const option = document.createElement('option');
                        option.value = name;
                        dataList.appendChild(option);
                    });
            }

            input.addEventListener('input', updateNameSuggestions);

            form.addEventListener('submit', event => {
                event.preventDefault();
                checkAnswer(input.value.trim());
            });

            form.append(input, submitButton, dataList);
            optionsContainer.appendChild(form);
            input.focus();
        }

        function beginCountdown(seconds) {
            setTimerDisplay(`Time left: ${seconds}s`);
            let remaining = seconds;
            countdownInterval = setInterval(() => {
                remaining -= 1;
                setTimerDisplay(`Time left: ${remaining}s`);
                if (remaining <= 0) {
                    clearTimers();
                    if (!hasAnswered) {
                        handleTimeout();
                    }
                }
            }, 1000);
            questionTimer = setTimeout(() => {
                clearTimers();
                if (!hasAnswered) {
                    handleTimeout();
                }
            }, seconds * 1000);
        }

        function handleTimeout() {
            hasAnswered = true;
            attempts += 1;
            resultMessage.textContent = 'Time is up!';
            resultMessage.classList.add('incorrect');
            const buttons = optionsContainer.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if (btn.textContent === currentQuote) {
                    btn.classList.add('correct');
                }
            });
            markProgress(false);
            updateScoreDisplay();
            currentQuestionIndex += 1;
            if (currentQuestionIndex >= maxQuestions) {
                setTimeout(showFinalScreen, 1200);
                return;
            }
            nextBtn.disabled = false;
        }

        function checkAnswer(selectedOption) {
            if (hasAnswered) return;
            hasAnswered = true;
            clearTimers();
            attempts += 1;
            const modeType = quizModes[currentModeId].type;
            const isTextEntry = modeType === 'textEntry';
            const isCorrect = isTextEntry
                ? compareNames(selectedOption, currentCorrectAnswer)
                : selectedOption === currentCorrectAnswer || selectedOption === currentQuote;
            const buttons = optionsContainer.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if (btn.textContent === currentCorrectAnswer || btn.textContent === currentQuote) {
                    btn.classList.add('correct');
                } else if (btn.textContent === selectedOption && !isCorrect) {
                    btn.classList.add('incorrect');
                }
            });

            if (isTextEntry) {
                const input = optionsContainer.querySelector('.typed-answer-input');
                const submitButton = optionsContainer.querySelector('.submit-answer-btn');
                if (input) {
                    input.classList.add(isCorrect ? 'correct' : 'incorrect');
                    input.disabled = true;
                }
                if (submitButton) {
                    submitButton.disabled = true;
                }
            }

            if (isCorrect) {
                score += 1;
                resultMessage.textContent = 'Correct! +1 point';
                resultMessage.classList.add('correct');
                markProgress(true);
            } else {
                resultMessage.textContent = modeType === 'speed'
                    ? `Incorrect! The right quote was highlighted.`
                    : `Incorrect! The correct answer is ${currentCorrectAnswer}`;
                resultMessage.classList.add('incorrect');
                markProgress(false);
            }

            updateScoreDisplay();
            currentQuestionIndex += 1;
            if (currentQuestionIndex >= maxQuestions) {
                setTimeout(showFinalScreen, 1200);
                return;
            }
            nextBtn.disabled = false;
        }

        nextBtn.addEventListener('click', () => {
            if (hasAnswered) {
                loadNextQuestion();
            }
        });

        backBtn.addEventListener('click', () => {
            window.location.assign('index.html');
        });

        restartBtn.addEventListener('click', startQuiz);
        themeToggleBtn.addEventListener('click', toggleTheme);

        window.addEventListener('load', initQuiz);

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
