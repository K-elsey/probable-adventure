<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .selector-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .selector-btn {
            padding: 12px 24px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .selector-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .selector-btn.active {
            background: #667eea;
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .quote-display {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 25px;
            margin: 30px 0;
            border-radius: 8px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            line-height: 1.6;
            color: #333;
            text-align: center;
            font-style: italic;
        }

        .quote-display.loading::before {
            content: "Loading quote...";
            color: #999;
        }

        .quote-display.empty::before {
            content: "Select a source and click 'Get Quote'";
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .get-quote-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .get-quote-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .get-quote-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .get-quote-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .copy-btn {
            padding: 14px 30px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover:not(:disabled) {
            background: #e0e0e0;
            border-color: #999;
        }

        .copy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .source-label {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .selector-btn {
                padding: 10px 18px;
                font-size: 0.95em;
            }

            .quote-display {
                min-height: 100px;
                font-size: 1em;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Quote Generator ✨</h1>

        <div class="error-message" id="errorMessage"></div>

        <div class="selector-group">
            <button class="selector-btn active" data-source="brown">Brown</button>
            <button class="selector-btn" data-source="jaae">Jaae</button>
            <button class="selector-btn" data-source="quote">Sean</button>
        </div>

        <div class="quote-display empty" id="quoteDisplay"></div>

        <div class="button-group">
            <button class="get-quote-btn" id="getQuoteBtn">Get Quote</button>
            <button class="copy-btn" id="copyBtn" disabled>Copy</button>
        </div>

        <div class="source-label" id="sourceLabel">Selected: Brown</div>
    </div>

    <script>
        let currentQuote = "";
        let selectedSource = "brown";
        let quotesCache = {};

        const selectorButtons = document.querySelectorAll('.selector-btn');
        const getQuoteBtn = document.getElementById('getQuoteBtn');
        const copyBtn = document.getElementById('copyBtn');
        const quoteDisplay = document.getElementById('quoteDisplay');
        const errorMessage = document.getElementById('errorMessage');
        const sourceLabel = document.getElementById('sourceLabel');

        // Map source names to GitHub URLs
        const sourceUrls = {
            brown: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Brown',
            jaae: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Jaae',
            quote: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Quote'
        };

        const sourceNames = {
            brown: 'Brown',
            jaae: 'Jaae',
            quote: 'Sean'
        };

        // Set up selector button listeners
        selectorButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                selectorButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedSource = btn.dataset.source;
                sourceLabel.textContent = `Selected: ${sourceNames[selectedSource]}`;
                quoteDisplay.textContent = '';
                quoteDisplay.classList.remove('empty');
                quoteDisplay.classList.add('empty');
                currentQuote = '';
                copyBtn.disabled = true;
                errorMessage.classList.remove('show');
            });
        });

        // Fetch quotes from GitHub
        async function fetchQuotes(source) {
            if (quotesCache[source]) {
                return quotesCache[source];
            }

            try {
                const response = await fetch(sourceUrls[source]);
                if (!response.ok) {
                    throw new Error(`Failed to fetch from ${source}`);
                }
                const text = await response.text();
                const quotes = text
                    .split(';')
                    .map(q => q.trim())
                    .filter(q => q.length > 0);
                
                quotesCache[source] = quotes;
                return quotes;
            } catch (error) {
                showError(`Error fetching quotes from ${sourceNames[source]}: ${error.message}`);
                throw error;
            }
        }

        // Get random quote
        async function getRandomQuote() {
            getQuoteBtn.disabled = true;
            quoteDisplay.textContent = 'Loading...';
            errorMessage.classList.remove('show');

            try {
                const quotes = await fetchQuotes(selectedSource);
                if (quotes.length === 0) {
                    throw new Error('No quotes found');
                }
                currentQuote = quotes[Math.floor(Math.random() * quotes.length)];
                quoteDisplay.textContent = currentQuote;
                quoteDisplay.classList.remove('empty');
                copyBtn.disabled = false;
            } catch (error) {
                quoteDisplay.textContent = '';
                quoteDisplay.classList.add('empty');
            } finally {
                getQuoteBtn.disabled = false;
            }
        }

        // Copy quote to clipboard
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentQuote).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        });

        // Get quote button listener
        getQuoteBtn.addEventListener('click', getRandomQuote);

        // Allow Enter key to fetch quote
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !getQuoteBtn.disabled) {
                getRandomQuote();
            }
        });

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
