<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #222;
        }

        body.old-school {
            background: radial-gradient(circle at top left, #7d6b3d 0%, #1b2d1f 40%, #0c1a11 100%);
            color: #f3e8c8;
        }

        body.old-school .container {
            background: #1f2918;
            border: 2px solid #7d6f3d;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .top-nav {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 20px;
            padding: 12px 18px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        body.old-school .top-nav {
            background: rgba(15, 18, 10, 0.88);
            border-color: rgba(157, 143, 99, 0.4);
        }

        .nav-title {
            font-size: 1em;
            font-weight: 700;
        }

        .theme-btn {
            padding: 10px 16px;
            background: #ffffff;
            border: 2px solid #d0d7ff;
            color: #2a3f7d;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
        }

        .theme-btn:hover {
            background: #e9efff;
        }

        body.old-school .theme-btn {
            background: #3f422e;
            border-color: #5e5b3a;
            color: #e8d8a8;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .selector-group {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
        }

        .checkbox-container:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .checkbox-container.checked {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .checkbox-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
            cursor: pointer;
        }

        .checkbox-container label {
            font-weight: 600;
            cursor: pointer;
            margin: 0;
        }

        .quote-display {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 25px;
            margin: 30px 0;
            border-radius: 8px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            line-height: 1.6;
            color: #333;
            text-align: center;
            font-style: italic;
        }

        .quote-display.loading::before {
            content: "Loading quote...";
            color: #999;
        }

        .quote-display.empty::before {
            content: "Select a source and click 'Get Quote'";
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quiz-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .quiz-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }

        .quiz-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .quiz-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .get-quote-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .get-quote-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .get-quote-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .get-quote-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .copy-btn {
            padding: 14px 30px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover:not(:disabled) {
            background: #e0e0e0;
            border-color: #999;
        }

        .copy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .source-label {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .checkbox-container {
                padding: 8px 12px;
                font-size: 0.95em;
            }

            .checkbox-container input[type="checkbox"] {
                width: 16px;
                height: 16px;
            }

            .quote-display {
                min-height: 100px;
                font-size: 1em;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="nav-title">Quote Generator</div>
        <button type="button" class="theme-btn" id="themeToggleBtn">Old School</button>
    </div>
    <div class="container">
        <h1>✨ Quote Generator ✨</h1>

        <div class="error-message" id="errorMessage"></div>

        <div class="selector-group">
            <div class="checkbox-container checked">
                <input type="checkbox" id="brown" data-source="brown" checked>
                <label for="brown">Chat</label>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="jaae" data-source="jaae">
                <label for="jaae">Jaae</label>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="quote" data-source="quote">
                <label for="quote">Sean</label>
            </div>
        </div>

        <div class="quote-display empty" id="quoteDisplay"></div>

        <div class="button-group">
            <button class="get-quote-btn" id="getQuoteBtn">Get Quote</button>
            <button class="copy-btn" id="copyBtn" disabled>Copy</button>
        </div>

        <div class="button-group">
            <button type="button" class="quiz-btn" id="quizBtn" disabled>Take Quiz</button>
        </div>

        <div class="source-label" id="sourceLabel">Selected: Brown</div>
    </div>

    <script>
        let currentQuote = "";
        let selectedSources = ["brown"]; // Array of selected sources
        let quotesCache = {};

        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const getQuoteBtn = document.getElementById('getQuoteBtn');
        const copyBtn = document.getElementById('copyBtn');
        const quizBtn = document.getElementById('quizBtn');
        const quoteDisplay = document.getElementById('quoteDisplay');
        const errorMessage = document.getElementById('errorMessage');
        const sourceLabel = document.getElementById('sourceLabel');
        const themeToggleBtn = document.getElementById('themeToggleBtn');

        // Map source names to GitHub URLs
        const sourceUrls = {
            brown: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Brown',
            jaae: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Jaae',
            quote: 'https://raw.githubusercontent.com/K-elsey/probable-adventure/main/Quote'
        };

        const sourceNames = {
            brown: 'Chat',
            jaae: 'Jaae',
            quote: 'Sean'
        };

        // Update selected sources and UI
        function updateSelectedSources() {
            selectedSources = Array.from(checkboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.dataset.source);

            // Update checkbox container styles
            checkboxes.forEach(cb => {
                const container = cb.closest('.checkbox-container');
                if (cb.checked) {
                    container.classList.add('checked');
                } else {
                    container.classList.remove('checked');
                }
            });

            // Update source label
            if (selectedSources.length === 0) {
                sourceLabel.textContent = "No sources selected";
            } else if (selectedSources.length === 1) {
                sourceLabel.textContent = `Selected: ${sourceNames[selectedSources[0]]}`;
            } else {
                const names = selectedSources.map(s => sourceNames[s]).join(', ');
                sourceLabel.textContent = `Selected: ${names}`;
            }

            // Enable/disable buttons
            getQuoteBtn.disabled = selectedSources.length === 0;
            quizBtn.disabled = selectedSources.length === 0;

            // Clear current quote if no sources selected
            if (selectedSources.length === 0) {
                quoteDisplay.textContent = '';
                quoteDisplay.classList.add('empty');
                currentQuote = '';
                copyBtn.disabled = true;
                errorMessage.classList.remove('show');
            }
        }

        // Set up checkbox listeners
        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                updateSelectedSources();
                saveState();
            });
        });

        function loadSavedState() {
            const savedState = localStorage.getItem('quoteGeneratorState');
            if (!savedState) return;

            try {
                const state = JSON.parse(savedState);
                if (Array.isArray(state.selectedSources) && state.selectedSources.length > 0) {
                    checkboxes.forEach(cb => {
                        cb.checked = state.selectedSources.includes(cb.dataset.source);
                    });
                }
                if (typeof state.currentQuote === 'string' && state.currentQuote.trim().length > 0) {
                    currentQuote = state.currentQuote;
                    quoteDisplay.textContent = currentQuote;
                    quoteDisplay.classList.remove('empty');
                    copyBtn.disabled = false;
                }
            } catch (error) {
                console.warn('Unable to restore saved quote generator state:', error);
            }
        }

        function saveState() {
            const state = {
                selectedSources,
                currentQuote
            };
            localStorage.setItem('quoteGeneratorState', JSON.stringify(state));
        }

        function loadTheme() {
            const storedTheme = localStorage.getItem('quizTheme');
            if (storedTheme === 'old-school') {
                document.body.classList.add('old-school');
                themeToggleBtn.textContent = 'Classic';
            } else {
                document.body.classList.remove('old-school');
                themeToggleBtn.textContent = 'Old School';
            }
        }

        function toggleTheme() {
            const nowOldSchool = document.body.classList.toggle('old-school');
            localStorage.setItem('quizTheme', nowOldSchool ? 'old-school' : 'default');
            themeToggleBtn.textContent = nowOldSchool ? 'Classic' : 'Old School';
        }

        // Initialize
        loadSavedState();
        updateSelectedSources();

        // Fetch quotes from GitHub
        async function fetchQuotes(source) {
            if (quotesCache[source]) {
                return quotesCache[source];
            }

            try {
                const response = await fetch(sourceUrls[source]);
                if (!response.ok) {
                    throw new Error(`Failed to fetch from ${source}`);
                }
                const text = await response.text();
                const quotes = text
                    .split(';')
                    .map(q => q.trim())
                    .filter(q => q.length > 0);
                
                quotesCache[source] = quotes;
                return quotes;
            } catch (error) {
                showError(`Error fetching quotes from ${sourceNames[source]}: ${error.message}`);
                throw error;
            }
        }

        // Get random quote from randomly selected source
        async function getRandomQuote() {
            if (selectedSources.length === 0) return;

            getQuoteBtn.disabled = true;
            quoteDisplay.textContent = 'Loading...';
            errorMessage.classList.remove('show');

            try {
                // Randomly select one source from selected sources
                const randomSource = selectedSources[Math.floor(Math.random() * selectedSources.length)];
                const quotes = await fetchQuotes(randomSource);
                if (quotes.length === 0) {
                    throw new Error('No quotes found');
                }
                currentQuote = quotes[Math.floor(Math.random() * quotes.length)];
                quoteDisplay.textContent = currentQuote;
                quoteDisplay.classList.remove('empty');
                copyBtn.disabled = false;
                saveState();
            } catch (error) {
                quoteDisplay.textContent = '';
                quoteDisplay.classList.add('empty');
            } finally {
                getQuoteBtn.disabled = selectedSources.length === 0;
            }
        }

        // Copy quote to clipboard
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentQuote).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        });

        // Get quote button listener
        getQuoteBtn.addEventListener('click', getRandomQuote);

        // Quiz button listener
        quizBtn.addEventListener('click', () => {
            saveState();
            window.location.href = 'quiz.html';
        });

        themeToggleBtn.addEventListener('click', toggleTheme);

        loadTheme();

        // Allow Enter key to fetch quote
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !getQuoteBtn.disabled) {
                getRandomQuote();
            }
        });

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
